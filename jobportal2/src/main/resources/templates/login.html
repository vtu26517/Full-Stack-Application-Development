<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="glass-nav">
    <h2>🚀 JobPortal</h2>
    <div class="nav-links">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/register}" class="btn">Sign Up</a>
    </div>
</nav>

<div class="auth-wrapper">
    <div class="glass-container auth-card">
        <h2 style="margin-bottom: 2rem; text-align: center;">Welcome Back</h2>
        
        <div th:if="${param.error}" class="alert alert-error">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            You have been logged out.
        </div>
        <div th:if="${param.success}" class="alert alert-success">
            Registration successful! Please login.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Log In</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Don't have an account? <a th:href="@{/register}" style="color: #6ee7b7; text-decoration: none;">Register here</a>
        </p>
    </div>
</div>

</body>
</html>
