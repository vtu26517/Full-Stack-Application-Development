<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>
        function toggleCompanyField() {
            var roleSelect = document.getElementById("role");
            var companyField = document.getElementById("companyField");
            if (roleSelect.value === "EMPLOYER") {
                companyField.style.display = "block";
            } else {
                companyField.style.display = "none";
            }
        }
    </script>
</head>
<body>

<nav class="glass-nav">
    <h2>🚀 JobPortal</h2>
    <div class="nav-links">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/login}" class="btn btn-secondary">Login</a>
    </div>
</nav>

<div class="auth-wrapper">
    <div class="glass-container auth-card">
        <h2 style="margin-bottom: 2rem; text-align: center;">Create Account</h2>
        
        <form th:action="@{/register}" th:object="${userDto}" method="post">
            
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" th:field="*{fullName}" class="form-control" required>
                <div th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" style="color: #fca5a5; font-size: 0.85rem; margin-top: 0.25rem;"></div>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}" class="form-control" required>
                <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color: #fca5a5; font-size: 0.85rem; margin-top: 0.25rem;"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" class="form-control" required>
                <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: #fca5a5; font-size: 0.85rem; margin-top: 0.25rem;"></div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" class="form-control" required>
                <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: #fca5a5; font-size: 0.85rem; margin-top: 0.25rem;"></div>
            </div>
            
            <div class="form-group">
                <label for="role">Register As</label>
                <select id="role" th:field="*{role}" class="form-control" onchange="toggleCompanyField()" required style="background: rgba(255, 255, 255, 0.1); color: #000;">
                    <option value="STUDENT">Student / Job Seeker</option>
                    <option value="EMPLOYER">Employer / Company</option>
                </select>
                <div th:if="${#fields.hasErrors('role')}" th:errors="*{role}" style="color: #fca5a5; font-size: 0.85rem; margin-top: 0.25rem;"></div>
            </div>
            
            <div class="form-group" id="companyField" style="display: none;">
                <label for="companyName">Company Name</label>
                <input type="text" id="companyName" th:field="*{companyName}" class="form-control">
            </div>

            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Register</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Already have an account? <a th:href="@{/login}" style="color: #6ee7b7; text-decoration: none;">Login here</a>
        </p>
    </div>
</div>

<script>
    // Initialize standard select box styling for dark mode compatibility 
    // Select options text color fix
    document.querySelectorAll('select option').forEach(opt => opt.style.color = '#000');
</script>
</body>
</html>
